<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mouse Revenge</title>
  <style>
    /* === BASE === */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* === HUD === */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-bottom: 1px solid #222;
      z-index: 10;
    }
    #score    { flex: 0 0 auto; font-size: 22px; font-weight: 600; }
    #airwrap  { flex: 1 1 auto; display: flex; align-items: center; gap: 10px; }
    #airbar   { flex: 1 1 auto; height: 14px; background: #222; border-radius: 7px; overflow: hidden; }
    #airfill  { height: 100%; width: 100%; background: #4ade80; transition: background 120ms linear; }
    #airlabel { flex: 0 0 auto; font-variant-numeric: tabular-nums; font-size: 14px; opacity: 0.85; min-width: 70px; text-align: right; }
    #dwellreq { flex: 0 0 auto; font-size: 14px; opacity: 0.85; font-variant-numeric: tabular-nums; }

    /* === PLAYFIELD === */
    #playfield {
      position: absolute;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid #1f1f1f;
      border-radius: 10px;
    }

    /* === SQUARE === */
    #square {
      position: absolute;
      background: #ff5b5b;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(255, 91, 91, 0.3);
      transition: filter 80ms linear;
      pointer-events: none; /* hover detection is purely cursor-coords based */
      overflow: hidden;
      transform-origin: 50% 50%;
    }
    #square.hovering { filter: brightness(1.2); }
    #square.teleporting {
      transition: filter 80ms linear,
                  left 250ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  top  250ms cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: jiggle 250ms ease-out;
    }
    @keyframes jiggle {
      0%   { transform: scale(1)    rotate(0);    }
      30%  { transform: scale(1.15) rotate(-4deg); }
      60%  { transform: scale(0.92) rotate(3deg);  }
      100% { transform: scale(1)    rotate(0);    }
    }
    #square > #fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.28);
    }
    #subtitle {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      padding: 0 16px;
    }
    #subtitle .tap-cue { display: none; }
    @media (pointer: coarse) {
      #subtitle .hover-cue { display: none; }
      #subtitle .tap-cue   { display: inline; }
    }

    /* === OVERLAY === */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 20;
    }
    #overlay[hidden] { display: none; }
    #overlay h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 700;
    }
    #overlay .score {
      font-size: 22px;
      opacity: 0.9;
    }
    #overlay button {
      font: inherit;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 24px;
      background: #ff5b5b;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #overlay button:hover { filter: brightness(1.1); }
    #square.dimmed { opacity: 0.35; }
  </style>
</head>
<body>
  <!-- === HUD === -->
  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="airwrap">
      <div id="airbar"><div id="airfill"></div></div>
      <div id="airlabel">5.00s left</div>
    </div>
    <div id="dwellreq">Next: 2000ms</div>
  </div>

  <!-- === PLAYFIELD === -->
  <div id="playfield"></div>
  <!-- Square is a sibling of the playfield (not a child), so its position is in viewport coords. -->
  <div id="square"><div id="fill"></div></div>
  <div id="subtitle">
    <span class="hover-cue">Hover the square to start. Don't let it escape for more than 5 seconds total.</span>
    <span class="tap-cue">Tap and hold the square to start. Don't let it escape for more than 5 seconds total.</span>
  </div>

  <!-- === GAME OVER OVERLAY === -->
  <div id="overlay" hidden>
    <h1>Game over.</h1>
    <div class="score">Score: <span id="finalscore">0</span></div>
    <button id="playagain">Play again</button>
  </div>

  <script>
    "use strict";

    // === STATE ===
    const HUD_HEIGHT     = 56;
    const AIRTIME_BUDGET = 5000;
    const INITIAL_DWELL  = 2000;
    // Playfield is always a 2:3 rectangle. Long side runs with the viewport's long side:
    // landscape viewports get a 3:2 (wider-than-tall) field; portrait viewports get a 2:3 (taller-than-wide) field.

    // SQUARE_SIZE and ANTI_CHEESE_DIST scale with the playfield; recomputed on resize.
    let SQUARE_SIZE      = 80;
    let ANTI_CHEESE_DIST = 150;

    const state = {
      phase: "idle",          // "idle" | "playing" | "gameover"
      playfield: { x: 0, y: HUD_HEIGHT, w: 0, h: 0 },
      square: { x: 0, y: 0, w: SQUARE_SIZE, h: SQUARE_SIZE },
      mouse:  { x: -1, y: -1 },
      dwellMs: INITIAL_DWELL,
      dwellProgressMs: 0,
      airTimeUsedMs: 0,
      score: 0,
    };

    const el = {
      square:    null,
      fill:      null,
      score:     null,
      airfill:   null,
      airlabel:  null,
      dwellreq:  null,
      playfield: null,
    };

    // === PURE HELPERS ===
    function decayDwell(currentMs) {
      // Exponential decay: each catch shaves 20% off the dwell requirement, floored at 100ms.
      return Math.max(100, Math.round(currentMs * 0.8));
    }

    function isInside(x, y, rect) {
      return x >= rect.x && x <= rect.x + rect.w &&
             y >= rect.y && y <= rect.y + rect.h;
    }

    function formatSecondsLeft(usedMs, budgetMs) {
      const remaining = Math.max(0, budgetMs - usedMs);
      return (remaining / 1000).toFixed(2) + "s left";
    }

    function chooseTeleportPosition(bounds, squareSize, cursor, minDistance, rng) {
      const minX = bounds.x;
      const minY = bounds.y;
      const rangeX = Math.max(0, bounds.w - squareSize);
      const rangeY = Math.max(0, bounds.h - squareSize);
      let best = null;
      let bestDist = -1;
      for (let i = 0; i < 10; i++) {
        const x = minX + Math.floor(rng() * (rangeX + 1));
        const y = minY + Math.floor(rng() * (rangeY + 1));
        const cx = x + squareSize / 2;
        const cy = y + squareSize / 2;
        const dx = cx - cursor.x;
        const dy = cy - cursor.y;
        const dist = Math.hypot(dx, dy);
        if (dist >= minDistance) {
          return { x, y };
        }
        if (dist > bestDist) {
          best = { x, y };
          bestDist = dist;
        }
      }
      return best;
    }

    function runSelfTests() {
      const failures = [];
      function assert(cond, msg) { if (!cond) failures.push(msg); }

      // decayDwell — exponential ×0.8 with 100ms floor.
      assert(decayDwell(2000) === 1600, "decayDwell(2000) should be 1600");
      assert(decayDwell(300)  === 240,  "decayDwell(300) should be 240");
      assert(decayDwell(100)  === 100,  "decayDwell(100) should clamp to 100");

      // isInside
      const rect = { x: 100, y: 100, w: 80, h: 80 };
      assert(isInside(140, 140, rect) === true,  "point inside should be true");
      assert(isInside(99, 140, rect) === false,  "point left of rect should be false");
      assert(isInside(181, 140, rect) === false, "point right of rect should be false");
      assert(isInside(100, 100, rect) === true,  "top-left corner should be inside (inclusive)");
      assert(isInside(180, 180, rect) === true,  "bottom-right corner should be inside (inclusive)");

      // formatSecondsLeft
      assert(formatSecondsLeft(0, 2000)    === "2.00s left", "full budget should be 2.00s left");
      assert(formatSecondsLeft(570, 2000)  === "1.43s left", "570ms used should be 1.43s left");
      assert(formatSecondsLeft(2000, 2000) === "0.00s left", "exhausted budget should be 0.00s left");
      assert(formatSecondsLeft(2500, 2000) === "0.00s left", "over-budget should clamp to 0.00s left");

      // chooseTeleportPosition: deterministic RNG
      // Far cursor — first sample should satisfy distance check.
      let pos = chooseTeleportPosition({ x: 0, y: 56, w: 1000, h: 744 }, 80, { x: 900, y: 700 }, 150, () => 0);
      assert(pos.x === 0 && pos.y === 56, "with rng()=0 and far cursor, top-left should be (0, 56)");

      // Picks a position fully within the bounds.
      pos = chooseTeleportPosition({ x: 0, y: 56, w: 1000, h: 744 }, 80, { x: 500, y: 400 }, 150, Math.random);
      assert(pos.x >= 0 && pos.x <= 920, "x must be in [bounds.x, bounds.x + bounds.w - squareSize]");
      assert(pos.y >= 56 && pos.y <= 720, "y must be in [bounds.y, bounds.y + bounds.h - squareSize]");

      // Tiny bounds where no candidate can possibly satisfy minDistance — should still return a position.
      pos = chooseTeleportPosition({ x: 0, y: 0, w: 100, h: 100 }, 80, { x: 50, y: 50 }, 150, Math.random);
      assert(pos !== null && pos.x >= 0 && pos.x <= 20 && pos.y >= 0 && pos.y <= 20,
        "tiny bounds should still yield a valid in-bounds position");

      if (failures.length > 0) {
        console.error("Self-tests FAILED:", failures);
        document.body.innerHTML = '<div style="padding:40px;color:#ff5b5b;font-family:monospace;">' +
          '<h2>Self-tests failed — game will not start.</h2><ul>' +
          failures.map(f => '<li>' + f + '</li>').join('') + '</ul></div>';
        return false;
      }
      console.log("Self-tests passed (" + 16 + " assertions).");
      return true;
    }

    // === RENDER ===
    function computePlayfield() {
      const W = window.innerWidth;
      const H = Math.max(0, window.innerHeight - HUD_HEIGHT);
      // 3:2 landscape on landscape viewports, 2:3 portrait on portrait viewports.
      const aspect = (W >= H) ? (3 / 2) : (2 / 3);
      let pw, ph;
      if (H === 0) {
        pw = W; ph = 0;
      } else if (W / H > aspect) {
        ph = H;
        pw = Math.floor(ph * aspect);
      } else {
        pw = W;
        ph = Math.floor(pw / aspect);
      }
      const px = Math.floor((W - pw) / 2);
      const py = HUD_HEIGHT + Math.floor((H - ph) / 2);

      state.playfield.x = px;
      state.playfield.y = py;
      state.playfield.w = pw;
      state.playfield.h = ph;

      // Square = ~12% of the playfield's smaller dimension; clamped 40–120px.
      SQUARE_SIZE = Math.max(40, Math.min(120, Math.round(0.12 * Math.min(pw, ph) || 80)));
      state.square.w = SQUARE_SIZE;
      state.square.h = SQUARE_SIZE;

      // Anti-cheese scales with square size; floor at 80px.
      ANTI_CHEESE_DIST = Math.max(80, Math.round(SQUARE_SIZE * 1.5));

      // Update DOM dimensions.
      el.playfield.style.left   = px + "px";
      el.playfield.style.top    = py + "px";
      el.playfield.style.width  = pw + "px";
      el.playfield.style.height = ph + "px";
      el.square.style.width     = SQUARE_SIZE + "px";
      el.square.style.height    = SQUARE_SIZE + "px";
    }

    function renderSquare(animate) {
      // Re-trigger the keyframe animation cleanly when animating.
      el.square.classList.remove("teleporting");
      if (animate) {
        // Force reflow so the browser sees the class removal commit before re-add.
        void el.square.offsetWidth;
        el.square.classList.add("teleporting");
      }
      el.square.style.left = state.square.x + "px";
      el.square.style.top  = state.square.y + "px";
    }

    function renderHUD() {
      el.score.textContent    = "Score: " + state.score;
      el.airlabel.textContent = formatSecondsLeft(state.airTimeUsedMs, AIRTIME_BUDGET);
      el.dwellreq.textContent = "Next: " + state.dwellMs + "ms";
      const remaining = Math.max(0, AIRTIME_BUDGET - state.airTimeUsedMs);
      const pct = remaining / AIRTIME_BUDGET;
      el.airfill.style.width = (pct * 100) + "%";
      // Color: green > 50%, yellow 20–50%, red < 20%.
      el.airfill.style.background = pct > 0.5 ? "#4ade80" : pct > 0.2 ? "#facc15" : "#ef4444";
    }

    function renderDwellFill() {
      const pct = state.dwellMs === 0 ? 0 : state.dwellProgressMs / state.dwellMs;
      el.fill.style.height = Math.min(100, pct * 100) + "%";
    }

    function renderHoverClass(hovering) {
      el.square.classList.toggle("hovering", hovering);
    }

    function centerSquareInPlayfield() {
      state.square.x = state.playfield.x + Math.floor((state.playfield.w - SQUARE_SIZE) / 2);
      state.square.y = state.playfield.y + Math.floor((state.playfield.h - SQUARE_SIZE) / 2);
    }

    // === GAME LOOP ===
    let lastFrame = 0;
    let rafId = 0;

    function onCatch() {
      state.score += 1;
      state.dwellMs = decayDwell(state.dwellMs);
      state.dwellProgressMs = 0;
      const pos = chooseTeleportPosition(
        state.playfield,
        SQUARE_SIZE,
        state.mouse,
        ANTI_CHEESE_DIST,
        Math.random
      );
      state.square.x = pos.x;
      state.square.y = pos.y;
      renderSquare(true);
    }

    function onGameOver() {
      state.phase = "gameover";
      cancelAnimationFrame(rafId);
      rafId = 0;
      document.getElementById("finalscore").textContent = state.score;
      document.getElementById("overlay").hidden = false;
      el.square.classList.add("dimmed");
      renderHoverClass(false);
    }

    function resetGame() {
      state.phase = "idle";
      state.score = 0;
      state.dwellMs = INITIAL_DWELL;
      state.dwellProgressMs = 0;
      state.airTimeUsedMs = 0;
      computePlayfield();
      centerSquareInPlayfield();
      document.getElementById("overlay").hidden = true;
      document.getElementById("subtitle").style.display = "";
      el.square.classList.remove("dimmed");
      renderSquare(false);
      renderHUD();
      renderDwellFill();
    }

    function tick(now) {
      const dt = lastFrame === 0 ? 0 : Math.min(100, now - lastFrame);
      lastFrame = now;

      if (state.phase === "playing") {
        const inside = isInside(state.mouse.x, state.mouse.y, state.square);
        renderHoverClass(inside);

        if (inside) {
          state.dwellProgressMs += dt;
          if (state.dwellProgressMs >= state.dwellMs) {
            onCatch();
          }
        } else {
          state.dwellProgressMs = 0;
          state.airTimeUsedMs = Math.min(AIRTIME_BUDGET, state.airTimeUsedMs + dt);
          if (state.airTimeUsedMs >= AIRTIME_BUDGET) {
            renderHUD();
            onGameOver();
            return;
          }
        }

        renderDwellFill();
        renderHUD();
      }

      rafId = requestAnimationFrame(tick);
    }

    function startPlaying() {
      if (state.phase !== "idle") return;
      state.phase = "playing";
      document.getElementById("subtitle").style.display = "none";
      lastFrame = 0;
      rafId = requestAnimationFrame(tick);
    }

    // === INPUT ===
    function setPointerFromTouch(ev) {
      if (ev.touches && ev.touches.length > 0) {
        state.mouse.x = ev.touches[0].clientX;
        state.mouse.y = ev.touches[0].clientY;
      }
    }

    function clearPointer() {
      state.mouse.x = -1;
      state.mouse.y = -1;
    }

    function attachInput() {
      document.addEventListener("mousemove", (ev) => {
        state.mouse.x = ev.clientX;
        state.mouse.y = ev.clientY;
        if (state.phase === "idle" && isInside(state.mouse.x, state.mouse.y, state.square)) {
          startPlaying();
        }
      });

      // Touch: a held finger acts like a cursor. Lifting it parks the pointer so air-time drains.
      document.addEventListener("touchstart", (ev) => {
        setPointerFromTouch(ev);
        if (state.phase === "idle" && isInside(state.mouse.x, state.mouse.y, state.square)) {
          startPlaying();
        }
      }, { passive: true });
      document.addEventListener("touchmove", (ev) => {
        setPointerFromTouch(ev);
      }, { passive: true });
      document.addEventListener("touchend",    clearPointer);
      document.addEventListener("touchcancel", clearPointer);

      document.getElementById("playagain").addEventListener("click", () => {
        resetGame();
      });
      window.addEventListener("resize", () => {
        computePlayfield();
        // Clamp square inside the new playfield.
        const maxX = state.playfield.x + state.playfield.w - SQUARE_SIZE;
        const maxY = state.playfield.y + state.playfield.h - SQUARE_SIZE;
        state.square.x = Math.max(state.playfield.x, Math.min(state.square.x, maxX));
        state.square.y = Math.max(state.playfield.y, Math.min(state.square.y, maxY));
        renderSquare(false);
      });
      document.addEventListener("mouseleave", clearPointer);
    }

    // === INIT ===
    if (runSelfTests()) {
      el.square    = document.getElementById("square");
      el.fill      = document.getElementById("fill");
      el.score     = document.getElementById("score");
      el.airfill   = document.getElementById("airfill");
      el.airlabel  = document.getElementById("airlabel");
      el.dwellreq  = document.getElementById("dwellreq");
      el.playfield = document.getElementById("playfield");

      computePlayfield();
      centerSquareInPlayfield();

      renderSquare(false);
      renderHUD();
      renderDwellFill();
      attachInput();
    }
  </script>
</body>
</html>
